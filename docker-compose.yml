version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: powerpro_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-powerpro_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: powerpro_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-powerpro_db}
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: powerpro_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  adminer:
    image: adminer
    container_name: powerpro_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
